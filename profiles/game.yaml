name: "iOS Game"
description: "Casual game development (Mendelian flower game)"

focus:
  performance: critical
  ui_polish: critical
  pixel_art_quality: high
  gameplay_smoothness: high
  medical_safety: none

checks:
  - "Check frame rate optimization (target 60fps)"
  - "Detect memory leaks and object pooling"
  - "Verify asset loading efficiency"
  - "Check animation smoothness"
  - "Measure touch response time"
  - "Analyze battery usage patterns"
  - "Verify pixel art rendering quality"
  - "Check for spatial partitioning"

